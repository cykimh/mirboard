name: CI

on:
  push:
    branches: [main]
  pull_request:

# 동시 실행 — 같은 branch 의 이전 run 은 취소 (PR force-push 시 자원 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (unit + IT)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      # Testcontainers 가 자체 컨테이너를 띄우므로 별도 services 불필요 —
      # Docker daemon 은 Ubuntu runner 에 기본 설치되어 있음.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Gradle test
        run: ./gradlew :server:test --no-daemon

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-reports
          path: |
            server/build/reports/tests/test/**
            server/build/test-results/test/**
          retention-days: 7

  client:
    name: Client (build + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm --prefix client ci

      - name: Type check
        run: npm --prefix client run build:check

      - name: Unit tests
        run: npm --prefix client run test

      - name: Production build
        run: npm --prefix client run build

  bundle-jar:
    name: Bundled jar smoke (server + client static)
    runs-on: ubuntu-latest
    needs: [server, client]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build bundled jar
        run: ./gradlew :server:bootJar -PbundleClient --no-daemon

      - name: Verify client assets bundled
        run: |
          set -e
          JAR=$(ls server/build/libs/server-*.jar | head -1)
          echo "Inspecting $JAR"
          unzip -l "$JAR" | grep -E 'static/(index.html|cards/)' | head -5
          unzip -l "$JAR" | grep -q 'BOOT-INF/classes/static/index.html'
