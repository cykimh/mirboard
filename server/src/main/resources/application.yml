spring:
  application:
    name: mirboard

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://${MIRBOARD_DB_HOST:127.0.0.1}:${MIRBOARD_DB_PORT:3306}/${MIRBOARD_DB_NAME:mirboard}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${MIRBOARD_DB_USER:mirboard}
    password: ${MIRBOARD_DB_PASSWORD:mirboardpw}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${MIRBOARD_REDIS_HOST:127.0.0.1}
      port: ${MIRBOARD_REDIS_PORT:6379}
      timeout: 2s

server:
  port: ${MIRBOARD_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        # Phase 6A-3 — health/info 외에 metrics + prometheus 노출.
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: mirboard
  prometheus:
    metrics:
      export:
        enabled: true

mirboard:
  jwt:
    secret: ${MIRBOARD_JWT_SECRET:dev-only-secret-please-override-with-32-bytes-min}
    expires-in: 12h
    issuer: mirboard
  messaging:
    # Phase 6D — 멀티 인스턴스 fan-out 모드. in-memory (default, 단일 인스턴스) 또는 redis.
    # redis 로 전환 시 STOMP broadcast 와 도메인 이벤트가 Redis Pub/Sub 위에서 흐른다.
    gateway: ${MIRBOARD_MESSAGING_GATEWAY:in-memory}

logging:
  pattern:
    # MDC (userId / roomId / eventId) 를 로그 라인에 자동 부착. 비어있으면 "-" 표시.
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} [user=%X{userId:--} room=%X{roomId:--} event=%X{eventId:--}] - %msg%n"
  level:
    root: INFO
    com.mirboard: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
