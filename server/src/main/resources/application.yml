spring:
  application:
    name: mirboard

  threads:
    virtual:
      enabled: true

  datasource:
    # Phase 7-1 (D-39) — PostgreSQL 16. MIRBOARD_DB_URL 로 전체 jdbc URL 을
    # 통째로 덮어쓸 수도 있고 (Fly/Supabase 형 secret), 그렇지 않으면 호스트/포트/디비
    # 조각을 조합한다. 기본 포트 5432.
    url: ${MIRBOARD_DB_URL:jdbc:postgresql://${MIRBOARD_DB_HOST:127.0.0.1}:${MIRBOARD_DB_PORT:5432}/${MIRBOARD_DB_NAME:mirboard}}
    username: ${MIRBOARD_DB_USER:mirboard}
    password: ${MIRBOARD_DB_PASSWORD:mirboardpw}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${MIRBOARD_REDIS_HOST:127.0.0.1}
      port: ${MIRBOARD_REDIS_PORT:6379}
      # Phase 7-3 (D-39) — Upstash / 매니지드 Redis 는 비밀번호 + TLS 필수.
      # 로컬 docker-compose 는 둘 다 비활성. prod 에서는 application-prod.yml 가 강제.
      password: ${MIRBOARD_REDIS_PASSWORD:}
      ssl:
        enabled: ${MIRBOARD_REDIS_SSL:false}
      timeout: 2s

server:
  port: ${MIRBOARD_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        # Phase 6A-3 — health/info 외에 metrics + prometheus 노출.
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: mirboard
  prometheus:
    metrics:
      export:
        enabled: true

mirboard:
  jwt:
    secret: ${MIRBOARD_JWT_SECRET:dev-only-secret-please-override-with-32-bytes-min}
    expires-in: 12h
    issuer: mirboard
  messaging:
    # Phase 6D — 멀티 인스턴스 fan-out 모드. in-memory (default, 단일 인스턴스) 또는 redis.
    # redis 로 전환 시 STOMP broadcast 와 도메인 이벤트가 Redis Pub/Sub 위에서 흐른다.
    gateway: ${MIRBOARD_MESSAGING_GATEWAY:in-memory}

logging:
  pattern:
    # MDC (userId / roomId / eventId) 를 로그 라인에 자동 부착. 비어있으면 "-" 표시.
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} [user=%X{userId:--} room=%X{roomId:--} event=%X{eventId:--}] - %msg%n"
  level:
    root: INFO
    com.mirboard: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
