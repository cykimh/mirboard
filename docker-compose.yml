services:
  postgres:
    image: postgres:16-alpine
    container_name: mirboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mirboard}
      POSTGRES_USER: ${POSTGRES_USER:-mirboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mirboardpw}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mirboard} -d ${POSTGRES_DB:-mirboard}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mirboard-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  flyway:
    image: flyway/flyway:10
    container_name: mirboard-flyway
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mirboard}
      - -user=${POSTGRES_USER:-mirboard}
      - -password=${POSTGRES_PASSWORD:-mirboardpw}
      - -connectRetries=30
      - -locations=filesystem:/flyway/sql
      - migrate
    volumes:
      - ./server/src/main/resources/db/migration:/flyway/sql:ro
    profiles: ["migrate"]

volumes:
  postgres-data:
  redis-data:
